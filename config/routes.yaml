# config/routes.yaml

# Основные маршруты аутентификации
app_login:
    path: /login
    controller: App\Controller\AuthController::login

app_register:
    path: /register
    controller: App\Controller\AuthController::register

app_logout:
    path: /logout
    controller: App\Controller\AuthController::logout

# API маршруты (если используете JWT)
api_login_check:
    path: /api/login_check

# Главная страница
app_home:
    path: /
    controller: App\Controller\BookingController::index

app_booking:
    path: /booking
    controller: App\Controller\BookingController::index

# Страница клиентов
app_clients:
    path: /clients
    controller: App\Controller\BookingController::clients

# Страница расписания
app_schedule:
    path: /schedule
    controller: App\Controller\BookingController::schedule

# Страница уведомлений
app_notifications:
    path: /notifications
    controller: App\Controller\BookingController::notifications

# Профиль клиента
app_client_profile:
    path: /client/{id}
    controller: App\Controller\BookingController::clientProfile

api_create_client:
    path: /api/clients
    controller: App\Controller\BookingController::createClient
    methods: [POST]

api_update_client:
    path: /api/clients/{id}
    controller: App\Controller\BookingController::updateClient
    methods: [POST]

api_create_appointment:
    path: /api/appointments/
    controller: App\Controller\BookingController::createAppointment
    methods: [POST]

api_appointments:
    path: /api/appointments/
    controller: App\Controller\BookingController::getAppointments
    methods: [GET]