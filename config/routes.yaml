# config/routes.yaml

# Основные маршруты аутентификации
app_login:
    path: /login
    controller: App\Controller\AuthController::login

app_register:
    path: /register
    controller: App\Controller\AuthController::register

app_logout:
    path: /logout
    controller: App\Controller\AuthController::logout

# API маршруты (если используете JWT)
api_login_check:
    path: /api/login_check

# Главная страница
app_home:
    path: /
    controller: App\Controller\BookingController::index

app_booking:
    path: /booking
    controller: App\Controller\BookingController::index

# Страница клиентов
app_clients:
    path: /clients
    controller: App\Controller\BookingController::clients

# Страница расписания
app_schedule:
    path: /schedule
    controller: App\Controller\BookingController::schedule

# Страница уведомлений
app_notifications:
    path: /notifications
    controller: App\Controller\BookingController::notifications

# Профиль клиента
app_client_profile:
    path: /client/{id}
    controller: App\Controller\BookingController::clientProfile

api_create_client:
    path: /api/clients
    controller: App\Controller\BookingController::createClient
    methods: [POST]

api_update_client:
    path: /api/clients/{id}
    controller: App\Controller\BookingController::updateClient
    methods: [POST]

api_create_appointment:
    path: /api/appointments
    controller: App\Controller\BookingController::createAppointment
    methods: [POST]

api_appointments:
    path: /api/appointments
    controller: App\Controller\BookingController::getAppointments
    methods: [GET]

api_client_appointments:
    path: /api/clients/{id}/appointments
    controller: App\Controller\BookingController::getClientAppointments
    methods: [GET]

api_delete_appointment:
    path: /api/appointments/{id}
    controller: App\Controller\BookingController::deleteAppointment
    methods: ['DELETE']
    requirements:
        id: '\d+'

api_clients:
    path: /api/clients
    controller: App\Controller\BookingController::getClients
    methods: ['GET']

api_get_client:
    path: /api/clients/{id}
    controller: App\Controller\BookingController::getClient
    methods: ['GET']
    requirements:
        id: '\d+'

api_add_category:
    path: /api/clients/{id}/categories
    controller: App\Controller\BookingController::addCategory
    methods: ['POST']
    requirements:
        id: '\d+'

api_remove_category:
    path: /api/clients/{id}/categories
    controller: App\Controller\BookingController::removeCategory
    methods: ['DELETE']
    requirements:
        id: '\d+'

api_all_appointments:
    path: /api/appointments/all
    controller: App\Controller\BookingController::getAllAppointments
    methods: ['GET']

api_clients_list:
    path: /api/clients
    controller: App\Controller\BookingController::getClientsList
    methods: ['GET']

api_notifications:
    path: /api/notifications
    controller: App\Controller\BookingController::getNotifications
    methods: ['GET']

api_notification_read:
    path: /api/notifications/{id}/read
    controller: App\Controller\BookingController::markNotificationRead
    methods: ['POST']
    requirements:
        id: '\d+'

api_notifications_read_all:
    path: /api/notifications/mark-all-read
    controller: App\Controller\BookingController::markAllNotificationsRead
    methods: ['POST']

api_clients_search:
    path: /api/clients/search
    controller: App\Controller\BookingController::searchClients
    methods: ['GET']

api_clients_recent:
    path: /api/clients/recent
    controller: App\Controller\BookingController::getRecentClients
    methods: ['GET']

app_profile:
    path: /profile
    controller: App\Controller\BookingController::profile
    methods: ['GET']

api_user_statistics:
    path: /api/user/statistics
    controller: App\Controller\BookingController::getUserStatistics
    methods: ['GET']

api_user_profile:
    path: /api/user/profile
    controller: App\Controller\BookingController::updateProfile
    methods: ['POST']

api_user_change_password:
    path: /api/user/change-password
    controller: App\Controller\BookingController::changePassword
    methods: ['POST']


